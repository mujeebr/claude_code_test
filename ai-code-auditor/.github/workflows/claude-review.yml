name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Run Claude Review
        run: |
          echo "Review the following code changes:" > prompt.txt
          cat diff.txt >> prompt.txt
          echo "\n\nProvide suggestions, bugs, and improvements." >> prompt.txt

      - name: Print Review (Simulated Claude)
        run: cat prompt.txt